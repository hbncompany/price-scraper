name: Price Scraper

on:
  workflow_dispatch:

    inputs:

      group_id:
        description: "Group ID"
        required: true
        type: string

      group_name:
        description: "Group Name"
        required: true
        type: string

      search_text:
        description: "Search Text"
        required: true
        type: string

permissions:
  contents: write

jobs:

  scrape:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          python -m playwright install chromium

      - name: Show inputs
        run: |
          echo "GROUP_ID=${{ github.event.inputs.group_id }}"
          echo "GROUP_NAME=${{ github.event.inputs.group_name }}"
          echo "SEARCH_TEXT=${{ github.event.inputs.search_text }}"

      - name: Run scraper
        run: |
          python scraper.py \
          "${{ github.event.inputs.group_id }}" \
          "${{ github.event.inputs.group_name }}" \
          "${{ github.event.inputs.search_text }}"

      - name: Commit products.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add products.json

          git diff --cached --quiet || git commit -m "Update products"

          git push
