name: Price Scraper

on:
 workflow_dispatch:

jobs:
 scrape:
  runs-on: ubuntu-latest

  steps:
   - uses: actions/checkout@v4

   - name: Setup Python
     uses: actions/setup-python@v5
     with:
       python-version: "3.11"

   - name: Install dependencies
     run: |
       pip install -r requirements.txt

   - name: Install Playwright
     run: |
       python -m playwright install chromium

   - name: Run scraper
     run: |
       python scraper.py
